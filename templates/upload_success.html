<!-- upload_success.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Success</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #fff;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
        }
        a button {
            margin-top: 30px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background-color: #ffffff;
            color: #2193b0;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        a button:hover {
            background-color: #2193b0;
            color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Upload Successful!</h1>
    <p>Thank you, <strong>{{ name }}</strong>. Your face image <strong>{{ filename }}</strong> has been saved.</p>
    <a href="/"><button>Back to Home</button></a>
</body>
</html>
