<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Real-time Face Detection & Refresh</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #fff;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        img.stream {
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background-color: #ffffff;
            color: #2193b0;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #2193b0;
            color: #fff;
            transform: scale(1.05);
        }
        p {
            font-size: 1.2rem;
            margin-top: 10px;
        }
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <h1>Real-time Face Detection & Recognition</h1>
    <img src="/detect_feed" class="stream" alt="Detection Stream" id="stream">

    <button onclick="refreshDatabase()">Refresh Face Database</button>
    <button onclick="exitDetection()">Exit Detection</button>
    <p id="status-message"></p>

    <audio id="success-sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>

    <script>
        function refreshDatabase() {
            fetch('/refresh_face_db', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('status-message').innerText = data.message;
                document.getElementById('success-sound').play();
                setTimeout(() => {
                    document.getElementById('status-message').innerText = '';
                }, 3000);
            })
            .catch(err => {
                document.getElementById('status-message').innerText = 'Error refreshing database';
            });
        }

        function exitDetection() {
            fetch('/stop_detect_feed', { method: 'POST' })
                .then(() => {
                    window.location.href = "/";
                })
                .catch(() => {
                    window.location.href = "/";
                });
        }
    </script>
</body>
</html>
