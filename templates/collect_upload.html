<!DOCTYPE html>
<!-- collect_upload.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Face Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6dd5ed, #2193b0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #fff;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            color: #333;
        }
        input[type="text"], input[type="file"] {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background-color: #2193b0;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #17627d;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Upload Your Face</h1>
    <form class="upload-form" action="/collect_upload" method="POST" enctype="multipart/form-data">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="photo">Upload Face Image:</label>
        <input type="file" id="photo" name="photo" accept="image/*" required>

        <button type="submit">Upload</button>
    </form>
</body>
</html>
